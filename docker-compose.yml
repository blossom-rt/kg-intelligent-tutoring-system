services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 983491037
      MYSQL_DATABASE: kg_tutoring_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init_all.sql:/docker-entrypoint-initdb.d/init_all.sql:ro
      - ./db/seed_all.sql:/docker-entrypoint-initdb.d/seed_all.sql:ro
      - ./db/enrich_learning_materials.sql:/docker-entrypoint-initdb.d/enrich_learning_materials.sql:ro
      - ./db/docker-init.sql:/docker-entrypoint-initdb.d/docker-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./kg-tutoring-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kg_tutoring_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 983491037

  frontend:
    build: ./kg-tutoring-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
