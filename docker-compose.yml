services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 983491037
      MYSQL_DATABASE: kg_tutoring_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init/init_all.sql:/docker-entrypoint-initdb.d/01_init_all.sql:ro
      - ./db/init/seed_all.sql:/docker-entrypoint-initdb.d/02_seed_all.sql:ro
      - ./db/init/enrich_learning_materials.sql:/docker-entrypoint-initdb.d/03_enrich_learning_materials.sql:ro
      - ./db/migrate/add_practice_question_types.sql:/docker-entrypoint-initdb.d/04_add_practice_question_types.sql:ro
      - ./db/migrate/migrate_chapters.sql:/docker-entrypoint-initdb.d/05_migrate_chapters.sql:ro
      - ./db/migrate/top_up_practice_questions_to_7.sql:/docker-entrypoint-initdb.d/06_top_up_practice_questions_to_7.sql:ro
      - ./db/docker-init.sql:/docker-entrypoint-initdb.d/99_docker-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./kg-tutoring-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kg_tutoring_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 983491037

  frontend:
    build: ./kg-tutoring-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
